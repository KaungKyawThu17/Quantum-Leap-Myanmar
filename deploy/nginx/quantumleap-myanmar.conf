limit_req_zone $binary_remote_addr zone=contact_form:10m rate=5r/m;

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name quantumleap-myanmar.com www.quantumleap-myanmar.com;

    location /.well-known/acme-challenge/ {
        root /var/www/quantumleap-myanmar/acme;
    }

    location / {
        return 301 https://quantumleap-myanmar.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.quantumleap-myanmar.com;

    ssl_certificate /etc/letsencrypt/live/quantumleap-myanmar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quantumleap-myanmar.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://quantumleap-myanmar.com$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server ipv6only=on;
    http2 on;
    server_name quantumleap-myanmar.com;

    root /var/www/quantumleap-myanmar/current/public;
    charset utf-8;

    ssl_certificate /etc/letsencrypt/live/quantumleap-myanmar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quantumleap-myanmar.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 64k;

    location = /api/contact {
        limit_req zone=contact_form burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_build/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:avif|gif|ico|jpe?g|mp4|png|svg|webm|webp|woff2?)$ {
        try_files $uri @app;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri @app;
    }

    location @app {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
